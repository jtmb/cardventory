name: Auto Tag

on:
  push:
    branches: [main]
    # No paths filter — every merge to main triggers a release

permissions:
  actions: write
  contents: write

jobs:
  tag:
    # Skip commits made by the bot itself (version bump commits)
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Ensure unique version and tag
        id: tagger
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TAG="v$CURRENT"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists — auto-bumping patch version"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            NEW_TAG="v$NEW_VERSION"

            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "

            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git main

            git tag "$NEW_TAG"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$NEW_TAG"
            echo "Bumped to $NEW_VERSION and created tag $NEW_TAG"
            echo "final_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$TAG"
            echo "Created tag $TAG"
            echo "final_tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tagger.outputs.final_tag }}"
          echo "Dispatching release.yml for $TAG"
          gh workflow run release.yml \
            --repo ${{ github.repository }} \
            --field tag="$TAG"
