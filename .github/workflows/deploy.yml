name: Deploy

on:
  # Triggered by release.yml after a successful build, or manually
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.49)"
        required: false
        default: ""

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord — Deploy started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          ACTOR_URL: ${{ github.server_url }}/${{ github.actor }}
          VERSION: ${{ github.event.inputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          actor = os.environ['ACTOR']
          actor_url = os.environ['ACTOR_URL']
          v = os.environ.get('VERSION', '')
          run_url = os.environ['RUN_URL']
          version_str = f'\`v{v}\`' if v else 'latest'
          p = {'embeds': [{'title': '\U0001f6a7 Deploy Started', 'description': f'**Version:** {version_str}\n**Triggered by:** [{actor}]({actor_url})\n**Run:** [View workflow]({run_url})', 'color': 16776960}]}
          r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
          try:
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Deploy to Linode
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.LINODE_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/cardventory
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Notify Discord — Deploy succeeded
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          HOST: ${{ vars.LINODE_HOST }}
          VERSION: ${{ github.event.inputs.version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ github.event.inputs.version }}
        run: |
          python3 -c "
          import json, os, urllib.request
          v = os.environ.get('VERSION', '')
          host = os.environ.get('HOST', 'unknown')
          rel = os.environ.get('RELEASE_URL', '')
          desc = (f'\`v{v}\` is live on \`{host}\`' if v else f'Latest is live on \`{host}\`')
          fields = [
            {'name': '\U0001f528 Build', 'value': 'passed', 'inline': True},
            {'name': '\U0001f4e6 Docker Push', 'value': 'pushed to GHCR', 'inline': True},
            {'name': '\U0001f6e1\ufe0f Security Scan', 'value': 'no critical CVEs', 'inline': True},
            {'name': '\U0001f680 Deployed', 'value': f'\`{host}\`', 'inline': True},
          ]
          if v and rel:
            fields.append({'name': '\U0001f3f7\ufe0f Release', 'value': f'[v{v}]({rel})', 'inline': True})
          p = {'embeds': [{'title': '\u2705 Deployment Complete', 'description': desc, 'color': 3066993, 'fields': fields}]}
          r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
          try:
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Notify Discord — Deploy failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\u274c Deployment Failed',
            'description': f'Deploy to Linode failed — [view logs]({os.environ[\"RUN_URL\"]})',
            'color': 15158332,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true
