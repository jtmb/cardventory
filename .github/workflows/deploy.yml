name: Deploy

on:
  # Triggered by release.yml after a successful build, or manually
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.LINODE_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/cardventory
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
