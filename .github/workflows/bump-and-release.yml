name: Bump And Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which part to bump: major, minor, patch'
        required: false
        default: 'patch'

permissions:
  contents: write
  packages: write
  security-events: write
  actions: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jtmb/cardventory

jobs:
  bump-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: ver
        run: |
          git fetch --tags
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.' | head -n1)
          if [ -z "$latest" ]; then
            echo "next=v1.0.0" >> $GITHUB_OUTPUT
            exit 0
          fi
          v=${latest#v}
          IFS='.' read -r major minor patch <<< "$v"
          case "${{ github.event.inputs.bump }}" in
            major) minor=0; patch=0; major=$((major+1));;
            minor) patch=0; minor=$((minor+1));;
            *) patch=$((patch+1));;
          esac
          next="v${major}.${minor}.${patch}"
          echo "next=${next}" >> $GITHUB_OUTPUT

      - name: Create tag
        id: create_tag
        env:
          NEXT_TAG: ${{ steps.ver.outputs.next }}
        run: |
          if [ -z "$NEXT_TAG" ]; then echo "No tag computed"; exit 1; fi
          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=${{ steps.ver.outputs.next }}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.next }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.next }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: steps.docker_build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.next }}
          generate_release_notes: true

      - name: Trigger Deploy workflow
        if: steps.docker_build.outcome == 'success'
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"version\":\"${{ steps.ver.outputs.next }}\"}}"

