name: Bump And Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which part to bump: major, minor, patch'
        required: false
        default: 'patch'

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: ver
        run: |
          git fetch --tags
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.' | head -n1)
          if [ -z "$latest" ]; then
            echo "next=v1.0.0" >> $GITHUB_OUTPUT
            exit 0
          fi
          v=${latest#v}
          IFS='.' read -r major minor patch <<< "$v"
          case "${{ github.event.inputs.bump }}" in
            major) minor=0; patch=0; major=$((major+1));;
            minor) patch=0; minor=$((minor+1));;
            *) patch=$((patch+1));;
          esac
          next="v${major}.${minor}.${patch}"
          echo "next=${next}" >> $GITHUB_OUTPUT

      - name: Create tag
        env:
          NEXT_TAG: ${{ steps.ver.outputs.next }}
        run: |
          if [ -z "$NEXT_TAG" ]; then echo "No tag computed"; exit 1; fi
          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

      - name: Notify
        run: echo "Created and pushed tag ${{ steps.ver.outputs.next }}"
