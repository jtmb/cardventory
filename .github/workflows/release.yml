name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.7)"
        required: true

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jtmb/cardventory

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub release
      packages: write       # push to ghcr.io
      security-events: write # upload Trivy SARIF
      actions: write        # dispatch deploy workflow

    steps:
      - name: Notify Discord — Pipeline started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          ACTOR_URL: ${{ github.server_url }}/${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT: ${{ github.event_name }}
        run: |
          python3 -c "
          import json, os, urllib.request
          actor = os.environ['ACTOR']
          actor_url = os.environ['ACTOR_URL']
          sha = os.environ['COMMIT_SHA'][:7]
          commit_url = os.environ['COMMIT_URL']
          ref = os.environ['REF_NAME']
          run_url = os.environ['RUN_URL']
          event = os.environ['EVENT']
          trigger = f'[{sha}]({commit_url})' if event != 'workflow_dispatch' else f'manual via [{actor}]({actor_url})'
          p = {'embeds': [{'title': '\U0001f504 Release Pipeline Started', 'description': f'**Tag:** \`{ref}\`\n**Triggered by:** [{actor}]({actor_url})\n**Commit:** {trigger}\n**Run:** [View workflow]({run_url})', 'color': 3447003}]}
          r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
          try:
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
            echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord — Docker build failed
        if: steps.docker_build.outcome == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\u274c Docker Build Failed',
            'description': f'Build failed for \`v{os.environ[\"VERSION\"]}\` — [view logs]({os.environ[\"RUN_URL\"]})',
            'color': 15158332,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Image

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

      - name: Trigger Deploy workflow
        if: success()
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"version\":\"${{ steps.version.outputs.version }}\"}}"
          echo "Dispatched deploy.yml"

      - name: Notify Discord — Release pipeline failed
        if: failure() && steps.docker_build.outcome != 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\u274c Release Pipeline Failed',
            'description': f'Release \`v{os.environ[\"VERSION\"]}\` failed — [view logs]({os.environ[\"RUN_URL\"]})',
            'color': 15158332,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true
