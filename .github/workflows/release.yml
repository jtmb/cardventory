name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.7)"
        required: true

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jtmb/cardventory

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub release
      packages: write       # push to ghcr.io
      security-events: write # upload Trivy SARIF
      actions: write        # dispatch deploy workflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
            echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord — Build started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\U0001f528 Build Started',
            'description': f'Building \`v{os.environ[\"VERSION\"]}\` in \`{os.environ[\"REPO\"]}\`',
            'color': 3447003,
            'fields': [
              {'name': 'Actor', 'value': os.environ['ACTOR'], 'inline': True},
              {'name': 'Run', 'value': f'[View]({os.environ[\"RUN_URL\"]})', 'inline': True},
            ]
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord — Docker image pushed
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ghcr.io/${{ env.IMAGE_NAME }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\U0001f4e6 Docker Image Pushed',
            'description': f'\`{os.environ[\"IMAGE\"]}:v{os.environ[\"VERSION\"]}\` pushed to GHCR',
            'color': 3066993,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Notify Discord — Docker build failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\u274c Docker Build Failed',
            'description': f'Build failed for \`v{os.environ[\"VERSION\"]}\` — [view logs]({os.environ[\"RUN_URL\"]})',
            'color': 15158332,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Notify Discord — Security scan complete
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\U0001f6e1\ufe0f Security Scan Passed',
            'description': f'No critical/high unfixed vulnerabilities in \`v{os.environ[\"VERSION\"]}\`',
            'color': 3066993,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Image

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

      - name: Trigger Deploy workflow
        if: success()
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Dispatched deploy.yml"

      - name: Notify Discord — Release published
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\u2705 Release v' + os.environ['VERSION'] + ' Published',
            'description': f'Image pushed, scan passed, release created. Deployment triggered.\n[View Release]({os.environ[\"RELEASE_URL\"]})',
            'color': 3066993,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true

      - name: Notify Discord — Release pipeline failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, urllib.request
          p = {'embeds': [{
            'title': '\u274c Release Pipeline Failed',
            'description': f'Release \`v{os.environ[\"VERSION\"]}\` failed — [view logs]({os.environ[\"RUN_URL\"]})',
            'color': 15158332,
          }]}
          try:
            r = urllib.request.Request(os.environ['DISCORD_WEBHOOK'], json.dumps(p).encode(), {'Content-Type': 'application/json', 'User-Agent': 'curl/7.68.0'})
            urllib.request.urlopen(r, timeout=10)
          except Exception as e:
            print('Discord notify failed:', e)
          " || true
