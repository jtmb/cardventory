name: Terraform

on:
  # Run plan on PRs targeting main that touch terraform files
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  # Apply when a PR is merged into main (or direct push)
  push:
    branches: [main]
    paths:
      - "terraform/**"
  # Manual trigger for initial provisioning or out-of-band changes
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
      TF_VAR_auth_secret: ${{ secrets.TF_VAR_AUTH_SECRET }}
      TF_VAR_nextauth_url: ${{ secrets.TF_VAR_NEXTAUTH_URL }}
      TF_VAR_cloudflare_tunnel_token: ${{ secrets.TF_VAR_CLOUDFLARE_TUNNEL_TOKEN }}
      TF_VAR_ghcr_username: ${{ secrets.TF_VAR_GHCR_USERNAME }}
      TF_VAR_ghcr_token: ${{ secrets.TF_VAR_GHCR_TOKEN }}
      TF_VAR_ebay_client_id: ${{ secrets.TF_VAR_EBAY_CLIENT_ID }}
      TF_VAR_ebay_client_secret: ${{ secrets.TF_VAR_EBAY_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Terraform state
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.run_id }}
          restore-keys: terraform-state-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Seed state for existing resources (cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          INSTANCE_ID="${{ vars.TF_INSTANCE_ID }}"
          FIREWALL_ID="${{ vars.TF_FIREWALL_ID }}"
          if [[ -n "$INSTANCE_ID" && -n "$FIREWALL_ID" ]]; then
            echo "Cache miss — importing existing resources into state..."
            terraform import linode_instance.cardventory "$INSTANCE_ID" || true
            terraform import linode_firewall.cardventory "$FIREWALL_ID" || true
          fi

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

      - name: Save Terraform state
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !cancelled()
        uses: actions/cache/save@v5
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.run_id }}

      - name: Show instance IP
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          IP=$(terraform output -raw instance_ip)
          echo "Instance IP: $IP"
          echo "::notice title=Instance IP::$IP — update LINODE_HOST variable if this changed: gh variable set LINODE_HOST --body \"$IP\" --repo ${{ github.repository }}"
