version: 2
updates:
  # Keep GitHub Actions pinned versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns: ["*"]

  # Keep npm dependencies patched
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Keep Terraform provider versions current
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
